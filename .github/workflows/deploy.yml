name: Déployer sur GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permet un déclenchement manuel depuis l'interface GitHub

# Permissions nécessaires pour le déploiement GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois — annule les runs en attente si un nouveau push arrive
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Créer l'artefact de déploiement
        uses: actions/upload-pages-artifact@v3
        with:
          # Déploie tout le dossier racine (index.html + assets/)
          path: '.'

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
